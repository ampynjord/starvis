# ============================================================
# STARVIS - API self-hosted (without IHM or bot)
# Runs only the REST API, PostgreSQL and Redis.
#
# Usage:
#   cp .env.api-only.example .env.api-only
#   # Fill .env.api-only
#   docker compose -f docker-compose.api-only.yml --env-file .env.api-only up -d
#
# The extractor runs outside Docker on the host machine. Point it to
# DB_HOST=127.0.0.1 and DB_PORT=${DB_EXTERNAL_PORT:-5432}.
# ============================================================

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-starvis}
      POSTGRES_USER: ${DB_USER:-starvis_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${DB_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/scripts/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAXMEMORY:-64mb} --maxmemory-policy allkeys-lru

  db-push:
    image: ${API_IMAGE:-ghcr.io/ampynjord/starvis-api:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-db-push
    environment:
      DATABASE_URL: postgresql://${DB_USER:-starvis_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-starvis}
    command: npm run push --workspace=@starvis/db
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: ${API_IMAGE:-ghcr.io/ampynjord/starvis-api:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-api
    volumes:
      - ctm_cache:/app/ctm-cache
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-starvis_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-starvis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-starvis_token}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-500}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-50}
      RATE_LIMIT_ADMIN_MAX: ${RATE_LIMIT_ADMIN_MAX:-100}
      CTM_CACHE_DIR: /app/ctm-cache
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      CHAT_PROVIDER_BASE_URL: ${CHAT_PROVIDER_BASE_URL:-https://api.mistral.ai/v1}
      CHAT_TOOL_MODEL: ${CHAT_TOOL_MODEL:-mistral-small-latest}
      CHAT_RESPONSE_MODEL: ${CHAT_RESPONSE_MODEL:-mistral-small-latest}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-}
    ports:
      - "${API_PORT:-127.0.0.1:3000}:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      db-push:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  ctm_cache:
