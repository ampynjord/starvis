# STARVIS - production stack behind Traefik.
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME}-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_BIND_HOST}:${DB_EXTERNAL_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/scripts/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    restart: ${RESTART_POLICY}
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis:
    image: ${REDIS_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME}-redis
    volumes:
      - redis_data:/data
    restart: ${RESTART_POLICY}
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT}
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAXMEMORY} --maxmemory-policy ${REDIS_MAXMEMORY_POLICY}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  api:
    image: ${API_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME}-api
    volumes:
      - ctm_cache:/app/ctm-cache
    environment:
      NODE_ENV: ${API_NODE_ENV}
      PORT: ${API_INTERNAL_PORT}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_INTERNAL_PORT}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      TWO_FACTOR_ENCRYPTION_KEY: ${TWO_FACTOR_ENCRYPTION_KEY}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME}
      LOG_LEVEL: ${LOG_LEVEL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST}
      RATE_LIMIT_ADMIN_MAX: ${RATE_LIMIT_ADMIN_MAX}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX}
      CTM_CACHE_DIR: ${CTM_CACHE_DIR}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      CHAT_PROVIDER_BASE_URL: ${CHAT_PROVIDER_BASE_URL}
      CHAT_TOOL_MODEL: ${CHAT_TOOL_MODEL}
      CHAT_RESPONSE_MODEL: ${CHAT_RESPONSE_MODEL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      CONTACT_EMAIL: ${CONTACT_EMAIL}
    restart: ${RESTART_POLICY}
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${API_INTERNAL_PORT}/health/live"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
      start_period: ${API_HEALTHCHECK_START_PERIOD}
    networks:
      - default
      - traefik-network
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK}"
      traefik.http.routers.starvis-api.rule: "Host(`${DOMAIN}`) && (PathPrefix(`/api/v1`) || PathPrefix(`/api-docs`) || PathPrefix(`/health`))"
      traefik.http.routers.starvis-api.entrypoints: "${TRAEFIK_ENTRYPOINT}"
      traefik.http.routers.starvis-api.tls.certresolver: "${TRAEFIK_CERT_RESOLVER}"
      traefik.http.routers.starvis-api.service: "starvis-api-svc"
      traefik.http.routers.starvis-api.priority: "${TRAEFIK_API_PRIORITY}"
      traefik.http.services.starvis-api-svc.loadbalancer.server.port: "${API_INTERNAL_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ihm:
    image: ${IHM_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME}-ihm
    environment:
      NODE_ENV: ${IHM_NODE_ENV}
      PORT: ${IHM_INTERNAL_PORT}
      API_URL: http://${API_HOST}:${API_INTERNAL_PORT}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_RSI_URL: ${NEXT_PUBLIC_RSI_URL}
      CONTACT_EMAIL: ${CONTACT_EMAIL}
      NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL}
      LEGAL_PUBLISHER_NAME: ${LEGAL_PUBLISHER_NAME}
      LEGAL_PUBLISHER_STATUS: ${LEGAL_PUBLISHER_STATUS}
      LEGAL_PUBLISHER_ADDRESS: ${LEGAL_PUBLISHER_ADDRESS}
      LEGAL_PUBLISHER_PHONE: ${LEGAL_PUBLISHER_PHONE}
      LEGAL_HOST_NAME: ${LEGAL_HOST_NAME}
      LEGAL_HOST_ADDRESS: ${LEGAL_HOST_ADDRESS}
      LEGAL_HOST_PHONE: ${LEGAL_HOST_PHONE}
      NEXT_PUBLIC_CHAT_PROVIDER_NAME: ${NEXT_PUBLIC_CHAT_PROVIDER_NAME}
      NEXT_PUBLIC_CHAT_PROVIDER_URL: ${NEXT_PUBLIC_CHAT_PROVIDER_URL}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      NEXT_PUBLIC_DISCORD_CLIENT_ID: ${NEXT_PUBLIC_DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      NEXT_PUBLIC_DISCORD_GUILD_ID: ${NEXT_PUBLIC_DISCORD_GUILD_ID}
      DISCORD_SERVER_INVITE_URL: ${DISCORD_SERVER_INVITE_URL}
      NEXT_PUBLIC_DISCORD_SERVER_INVITE_URL: ${NEXT_PUBLIC_DISCORD_SERVER_INVITE_URL}
    restart: ${RESTART_POLICY}
    deploy:
      resources:
        limits:
          memory: ${IHM_MEMORY_LIMIT}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${IHM_INTERNAL_PORT}/"]
      interval: ${IHM_HEALTHCHECK_INTERVAL}
      timeout: ${IHM_HEALTHCHECK_TIMEOUT}
      start_period: ${IHM_HEALTHCHECK_START_PERIOD}
      retries: ${IHM_HEALTHCHECK_RETRIES}
    networks:
      - default
      - traefik-network
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK}"
      traefik.http.routers.starvis-ihm.rule: "Host(`${DOMAIN}`)"
      traefik.http.routers.starvis-ihm.entrypoints: "${TRAEFIK_ENTRYPOINT}"
      traefik.http.routers.starvis-ihm.tls.certresolver: "${TRAEFIK_CERT_RESOLVER}"
      traefik.http.services.starvis-ihm.loadbalancer.server.port: "${IHM_INTERNAL_PORT}"
    depends_on:
      api:
        condition: service_healthy

  bot:
    image: ${BOT_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME}-bot
    environment:
      NODE_ENV: ${BOT_NODE_ENV}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      API_URL: http://${API_HOST}:${API_INTERNAL_PORT}
      SITE_URL: ${SITE_URL}
      API_TOKEN: ${API_TOKEN}
    restart: ${RESTART_POLICY}
    deploy:
      resources:
        limits:
          memory: ${BOT_MEMORY_LIMIT}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  ctm_cache:

networks:
  traefik-network:
    external: true
    name: ${TRAEFIK_NETWORK}
