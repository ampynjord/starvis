# ============================================================
# STARVIS — Production (VPS derrière Traefik)
# Images pré-buildées depuis GHCR, routage via Traefik
# Usage : docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# ============================================================

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-starvis}
      POSTGRES_USER: ${DB_USER:-starvis_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-starvis_pass}
    # Port exposé en loopback uniquement — pour extractions locales via tunnel SSH
    ports:
      - "127.0.0.1:${DB_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-512M}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-64M}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAXMEMORY:-32mb} --maxmemory-policy allkeys-lru

  api:
    image: ${API_IMAGE:-ghcr.io/ampynjord/starvis-api:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-api
    volumes:
      - ctm_cache:/app/ctm-cache
    environment:
      NODE_ENV: production
      PORT: ${API_INTERNAL_PORT:-3000}
      DATABASE_URL: postgresql://${DB_USER:-starvis_user}:${DB_PASSWORD:-starvis_pass}@postgres:5432/${DB_NAME:-starvis}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_INTERNAL_PORT:-6379}
      INSPECTION_MODE: ${INSPECTION_MODE:-false}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://${DOMAIN}}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-30}
      CTM_CACHE_DIR: /app/ctm-cache
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-256M}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${API_INTERNAL_PORT:-3000}/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - default
      - traefik-network
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik-network}"
      traefik.http.routers.starvis-api-docs.rule: "Host(`${DOMAIN}`) && PathPrefix(`/api-docs`)"
      traefik.http.routers.starvis-api-docs.entrypoints: "websecure"
      traefik.http.routers.starvis-api-docs.tls.certresolver: "${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      traefik.http.routers.starvis-api-docs.service: "starvis-api-svc"
      traefik.http.routers.starvis-api-docs.priority: "100"
      traefik.http.routers.starvis-api.rule: "Host(`${DOMAIN}`) && PathPrefix(`/api`, `/health`, `/admin`)"
      traefik.http.routers.starvis-api.entrypoints: "websecure"
      traefik.http.routers.starvis-api.tls.certresolver: "${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      traefik.http.routers.starvis-api.service: "starvis-api-svc"
      traefik.http.routers.starvis-api.priority: "90"
      traefik.http.services.starvis-api-svc.loadbalancer.server.port: "${API_INTERNAL_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ihm:
    image: ${IHM_IMAGE:-ghcr.io/ampynjord/starvis-ihm:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-ihm
    environment:
      API_URL: http://${API_HOST:-api}:${API_INTERNAL_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-}
      INSPECTION_MODE: ${INSPECTION_MODE:-false}
      NEXT_PUBLIC_INSPECTION_MODE: ${INSPECTION_MODE:-false}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${IHM_MEMORY_LIMIT:-128M}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    depends_on:
      - api
    networks:
      - default
      - traefik-network
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik-network}"
      traefik.http.routers.starvis-ihm.rule: "Host(`${DOMAIN}`)"
      traefik.http.routers.starvis-ihm.entrypoints: "websecure"
      traefik.http.routers.starvis-ihm.tls.certresolver: "${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      traefik.http.services.starvis-ihm.loadbalancer.server.port: "8080"

  bot:
    image: ${BOT_IMAGE:-ghcr.io/ampynjord/starvis-bot:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-bot
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      API_URL: http://${API_HOST:-api}:${API_INTERNAL_PORT:-3000}
      SITE_URL: ${SITE_URL:-https://${DOMAIN}}
      API_TOKEN: ${API_TOKEN:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${BOT_MEMORY_LIMIT:-128M}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  ctm_cache:

networks:
  traefik-network:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-network}
