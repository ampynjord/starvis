# STARVIS - production stack behind Traefik.
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_BIND_HOST:-127.0.0.1}:${DB_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/scripts/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-512M}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: ${HEALTHCHECK_INTERVAL:-10s}
      timeout: ${HEALTHCHECK_TIMEOUT:-5s}
      retries: ${HEALTHCHECK_RETRIES:-5}

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-redis
    volumes:
      - redis_data:/data
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-64M}
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAXMEMORY:-32mb} --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: ${HEALTHCHECK_INTERVAL:-10s}
      timeout: ${HEALTHCHECK_TIMEOUT:-5s}
      retries: ${HEALTHCHECK_RETRIES:-5}

  api:
    image: ${API_IMAGE:-ghcr.io/ampynjord/starvis-api:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-api
    volumes:
      - ctm_cache:/app/ctm-cache
    environment:
      NODE_ENV: ${API_NODE_ENV:-production}
      PORT: ${API_INTERNAL_PORT:-3000}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_INTERNAL_PORT:-6379}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-starvis_token}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-30}
      RATE_LIMIT_ADMIN_MAX: ${RATE_LIMIT_ADMIN_MAX:-100}
      CTM_CACHE_DIR: ${CTM_CACHE_DIR:-/app/ctm-cache}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      CHAT_PROVIDER_BASE_URL: ${CHAT_PROVIDER_BASE_URL:-https://api.mistral.ai/v1}
      CHAT_TOOL_MODEL: ${CHAT_TOOL_MODEL:-mistral-small-latest}
      CHAT_RESPONSE_MODEL: ${CHAT_RESPONSE_MODEL:-mistral-small-latest}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      CONTACT_EMAIL: ${CONTACT_EMAIL}
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-256M}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${API_INTERNAL_PORT:-3000}/health/live"]
      interval: ${HEALTHCHECK_INTERVAL:-10s}
      timeout: ${HEALTHCHECK_TIMEOUT:-5s}
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: ${API_HEALTHCHECK_START_PERIOD:-15s}
    networks:
      - default
      - traefik-network
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik-network}"
      traefik.http.routers.starvis-api.rule: "Host(`${DOMAIN}`) && (PathPrefix(`/api/v1`) || PathPrefix(`/api-docs`) || PathPrefix(`/health`))"
      traefik.http.routers.starvis-api.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.starvis-api.tls.certresolver: "${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      traefik.http.routers.starvis-api.service: "starvis-api-svc"
      traefik.http.routers.starvis-api.priority: "${TRAEFIK_API_PRIORITY:-90}"
      traefik.http.services.starvis-api-svc.loadbalancer.server.port: "${API_INTERNAL_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ihm:
    image: ${IHM_IMAGE:-ghcr.io/ampynjord/starvis-ihm:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-ihm
    environment:
      NODE_ENV: ${IHM_NODE_ENV:-production}
      PORT: ${IHM_INTERNAL_PORT:-8080}
      API_URL: http://${API_HOST:-api}:${API_INTERNAL_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-starvis_token}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_RSI_URL: ${NEXT_PUBLIC_RSI_URL:-https://robertsspaceindustries.com}
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          memory: ${IHM_MEMORY_LIMIT:-128M}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${IHM_INTERNAL_PORT:-8080}/"]
      interval: ${IHM_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${IHM_HEALTHCHECK_TIMEOUT:-3s}
      start_period: ${IHM_HEALTHCHECK_START_PERIOD:-10s}
      retries: ${IHM_HEALTHCHECK_RETRIES:-3}
    networks:
      - default
      - traefik-network
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik-network}"
      traefik.http.routers.starvis-ihm.rule: "Host(`${DOMAIN}`)"
      traefik.http.routers.starvis-ihm.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.starvis-ihm.tls.certresolver: "${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      traefik.http.services.starvis-ihm.loadbalancer.server.port: "${IHM_INTERNAL_PORT:-8080}"
    depends_on:
      api:
        condition: service_healthy

  bot:
    image: ${BOT_IMAGE:-ghcr.io/ampynjord/starvis-bot:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-bot
    environment:
      NODE_ENV: ${BOT_NODE_ENV:-production}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      API_URL: http://${API_HOST:-api}:${API_INTERNAL_PORT:-3000}
      SITE_URL: ${SITE_URL}
      API_TOKEN: ${API_TOKEN}
    restart: ${RESTART_POLICY:-unless-stopped}
    deploy:
      resources:
        limits:
          memory: ${BOT_MEMORY_LIMIT:-128M}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  ctm_cache:

networks:
  traefik-network:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-network}
