# Production — VPS derrière Traefik
# Images pré-buildées depuis GHCR, routage via Traefik
#
# Usage: docker compose -f docker-compose.prod.yml up -d
# Env:   cp .env.prod.example .env.prod && edit, puis passer --env-file .env.prod

services:
  mysql:
    image: mysql:8.0
    container_name: starvis-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: starvis
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    # Port exposé en loopback uniquement — pour extractions locales via tunnel SSH
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: starvis-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 32mb --maxmemory-policy allkeys-lru

  api:
    image: ghcr.io/ampynjord/starvis-api:latest
    container_name: starvis-api
    environment:
      NODE_ENV: production
      PORT: ${API_INTERNAL_PORT:-3000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: starvis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://starvis.ampynjord.bzh}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-30}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  ihm:
    image: ghcr.io/ampynjord/starvis-ihm:latest
    container_name: starvis-ihm
    environment:
      API_URL: http://api:3000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    # 127.0.0.1 explicite : Alpine résout localhost en IPv6
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    depends_on:
      - api
    networks:
      - default
      - traefik-network
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik-network"
      traefik.http.routers.starvis-ihm.rule: "Host(`starvis.ampynjord.bzh`)"
      traefik.http.routers.starvis-ihm.entrypoints: "websecure"
      traefik.http.routers.starvis-ihm.tls.certresolver: "letsencrypt"
      traefik.http.services.starvis-ihm.loadbalancer.server.port: "8080"

  bot:
    build:
      context: ./bot
    container_name: starvis-bot
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      API_URL: http://api:3000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      api:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:

networks:
  traefik-network:
    external: true
