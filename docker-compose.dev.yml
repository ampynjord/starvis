# ============================================================
# STARVIS — Développement local (hot reload)
# Usage : docker compose -f docker-compose.dev.yml --env-file .env.dev up
# Toutes les valeurs configurables via .env.dev (voir .env.dev.example)
# ============================================================

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-starvis}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-redis
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: development
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-api
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules
      - ctm_cache:/app/ctm-cache
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-starvis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-500}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-200}
      CTM_CACHE_DIR: /app/ctm-cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  ihm:
    image: node:22-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-ihm
    working_dir: /app
    volumes:
      - ./:/app
      - ihm_node_modules:/app/node_modules
    command: sh -c "npm install --prefer-offline && npm run dev --workspace=ihm -- -p 5173 -H 0.0.0.0"
    ports:
      - "${IHM_DEV_PORT:-5173}:5173"
    environment:
      VITE_API_URL: http://api:3000
      # Nécessaire sur Windows : Docker Desktop ne propage pas inotify vers le conteneur
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      WATCHPACK_POLLING: "true"
    depends_on:
      api:
        condition: service_healthy

  bot:
    image: node:22-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-starvis}-bot
    working_dir: /app
    volumes:
      - ./:/app
      - bot_node_modules:/app/node_modules
    command: sh -c "npm install --prefer-offline --silent && npm run dev --workspace=@starvis/bot"
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      API_URL: http://api:3000
      SITE_URL: ${SITE_URL:-http://localhost:5173}
    depends_on:
      api:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  api_node_modules:
  ihm_node_modules:
  bot_node_modules:
  ctm_cache:
