name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
# ─────────────────────────────────────────────────────────────
# BUILD — images versionées (api, ihm, bot)
# ─────────────────────────────────────────────────────────────
  build:
    name: Build & Push ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            file: api/Dockerfile
            target: production
          - name: ihm
            file: ihm/Dockerfile
            target: production
          - name: bot
            file: bot/Dockerfile
            target: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: ${{ matrix.image.target }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
          provenance: false

# ─────────────────────────────────────────────────────────────
# GITHUB RELEASE — notes auto-générées
# ─────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CHANGELOG
        uses: orhun/git-cliff-action@v3
        env:
          OUTPUT: RELEASE_BODY.md
          GITHUB_REPO: ${{ github.repository }}
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Append Docker pull instructions
        run: |
          TAG="${{ github.ref_name }}"
          PREFIX="${{ env.IMAGE_PREFIX }}"
          cat >> RELEASE_BODY.md << EOF

          ## Docker Images

          \`\`\`bash
          docker pull ${PREFIX}-api:${TAG}
          docker pull ${PREFIX}-ihm:${TAG}
          docker pull ${PREFIX}-bot:${TAG}
          \`\`\`

          ## Self-hosting

          Voir le [docker-compose.api-only.yml](docker-compose.api-only.yml) et [.env.api-only.example](.env.api-only.example).
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          body_path: RELEASE_BODY.md
