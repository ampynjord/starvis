name: CI/CD
on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality and Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_password
          MYSQL_DATABASE: starvis
          MYSQL_USER: ci_user
          MYSQL_PASSWORD: ci_password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies (Workspaces)
        run: npm ci

      - name: Generate DB Client
        run: npm run db:generate

      - name: Apply DB Schema
        run: |
          DATABASE_URL="mysql://root:ci_password@127.0.0.1:3306/starvis" npm run db:push
          DATABASE_URL="mysql://root:ci_password@127.0.0.1:3306/live" npm run db:push
          DATABASE_URL="mysql://root:ci_password@127.0.0.1:3306/ptu" npm run db:push

      - name: Lint workspace packages
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Type-check API & Extractor
        run: npm run typecheck --workspace=apps/api && npx tsc --noEmit --project apps/extractor/tsconfig.json

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write

    steps:
      - name: Skip unless main
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: echo "Skipped"

      - name: Checkout repository
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-api:${{ github.sha }},ghcr.io/${{ github.repository }}-api:latest
          target: production

      - name: Build and Push IHM
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/ihm/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-ihm:${{ github.sha }},ghcr.io/${{ github.repository }}-ihm:latest
          target: production

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Skip unless main
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: echo "Skipped"

      - name: Deploy to VPS via SSH
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: debian
          port: 22
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/debian/starvis
            git pull origin main
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ampynjord --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker system prune -af
