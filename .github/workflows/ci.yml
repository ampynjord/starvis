name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

# ─────────────────────────────────────────────────────────────
# LINT
# ─────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Biome check (read-only, no auto-fix)
        run: ./node_modules/.bin/biome ci .

# ─────────────────────────────────────────────────────────────
# TYPECHECK — matrix par workspace
# ─────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            cmd: ./node_modules/.bin/tsc --noEmit --project api/tsconfig.json
          - name: extractor
            cmd: ./node_modules/.bin/tsc --noEmit --project extractor/tsconfig.json
          - name: ihm
            cmd: ./node_modules/.bin/tsc --noEmit --project ihm/tsconfig.json
          - name: bot
            cmd: ./node_modules/.bin/tsc --noEmit --project bot/tsconfig.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate DB clients
        run: npm run db:generate

      # IHM: next-env.d.ts et .next/types/routes.d.ts sont gitignorés, on les crée avant tsc
      - name: Setup IHM next types
        if: matrix.name == 'ihm'
        run: |
          printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > ihm/next-env.d.ts
          mkdir -p ihm/.next/types
          echo 'export {}' > ihm/.next/types/routes.d.ts

      - name: Typecheck ${{ matrix.name }}
        run: ${{ matrix.cmd }}

# ─────────────────────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: npm audit (production deps only)
        run: npm audit --omit=dev --audit-level=critical

# ─────────────────────────────────────────────────────────────
# TESTS — API (nécessite postgres + redis)
# ─────────────────────────────────────────────────────────────
  test-api:
    name: Tests API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: ci_password
          POSTGRES_USER: ci_user
          POSTGRES_DB: starvis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate DB clients
        run: npm run db:generate

      - name: Apply DB schema (test DB)
        run: npm run push --workspace=@starvis/db
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/starvis_test

      - name: Run API tests
        run: npm run test --workspace=@starvis/api -- --reporter=verbose
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/starvis_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          NODE_ENV: test
          JWT_SECRET: ci_test_secret_at_least_32_chars_long
          ADMIN_API_KEY: ci_admin_key

# ─────────────────────────────────────────────────────────────
# TESTS — Extractor (pas de services requis)
# ─────────────────────────────────────────────────────────────
  test-extractor:
    name: Tests Extractor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate DB clients
        run: npm run db:generate

      - name: Run Extractor tests
        run: npm run test --workspace=@starvis/extractor -- --reporter=verbose
        env:
          NODE_ENV: test

# ─────────────────────────────────────────────────────────────
# TESTS — IHM (jsdom)
# ─────────────────────────────────────────────────────────────
  test-ihm:
    name: Tests IHM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run IHM tests
        run: npm run test --workspace=starvis-ihm -- --reporter=verbose

# ─────────────────────────────────────────────────────────────
# BUILD — images Docker (uniquement main ou tags v*)
# ─────────────────────────────────────────────────────────────
  build:
    name: Build & Push ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [lint, typecheck, test-api, test-extractor, test-ihm, security]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            file: api/Dockerfile
            target: production
          - name: ihm
            file: ihm/Dockerfile
            target: production
          - name: bot
            file: bot/Dockerfile
            target: ''

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: ${{ matrix.image.target }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
          provenance: false

# ─────────────────────────────────────────────────────────────
# DEPLOY — production VPS (uniquement main)
# ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    environment:
      name: production
      url: https://starvis.ampynjord.bzh

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: debian
          port: 22
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /home/debian/starvis

            echo "==> Pull latest code..."
            git pull origin main

            echo "==> Login GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ampynjord --password-stdin

            echo "==> Pull new images..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull

            echo "==> Rolling restart (zero-downtime)..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans

            echo "==> Prune old images..."
            docker image prune -af --filter "until=24h"

            echo "==> Health check..."
            sleep 10
            curl -sf http://localhost:3000/health/live || (echo "Health check FAILED" && exit 1)

            echo "==> Deploy complete."
