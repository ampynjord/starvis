name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  NODE_VERSION: '22'

jobs:
  install:
    name: Install & Generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            api/node_modules
            ihm/node_modules
            extractor/node_modules
            bot/node_modules
            db/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore Prisma client cache
        id: db-gen-cache
        uses: actions/cache@v5
        with:
          path: db/generated/
          key: db-gen-${{ runner.os }}-${{ hashFiles('db/prisma/**/*.prisma', 'db/prisma.config.ts') }}

      - name: Generate Prisma client
        if: steps.db-gen-cache.outputs.cache-hit != 'true'
        run: npm run db:generate

  security:
    name: Security & Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Critical dependency audit
        run: npm audit --omit=dev --audit-level=critical

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: error

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ihm/Dockerfile
          failure-threshold: error

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: bot/Dockerfile
          failure-threshold: error

  config:
    name: Config, Schema & Docs
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            api/node_modules
            ihm/node_modules
            extractor/node_modules
            bot/node_modules
            db/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install fallback
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Validate OpenAPI
        run: npm run openapi:lint --workspace=@starvis/api

      - name: Validate Prisma schema
        run: npm exec --workspace=@starvis/db -- prisma validate --schema=prisma/schema
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/starvis_test

      - name: Guard Prisma datasource config
        run: |
          if grep -R 'url *= *env(' db/prisma/schema/*.prisma; then
            echo "Prisma 7 requires datasource URLs in db/prisma.config.ts, not schema files"
            exit 1
          fi
          test -f db/prisma.config.ts

      - name: Validate shell scripts
        run: |
          bash -n db/scripts/init.sh
          bash -n db/scripts/backup.sh

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.dev.yml --env-file .env.dev.example config --quiet
          docker compose -f docker-compose.prod.yml --env-file .env.prod.example config --quiet

      - name: Check env examples cover compose variables
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          function envKeys(file) {
            return new Set(
              readFileSync(file, 'utf8')
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter((line) => line && !line.startsWith('#') && /^[A-Za-z_][A-Za-z0-9_]*=/.test(line))
                .map((line) => line.split('=', 1)[0]),
            );
          }

          function composeVars(file) {
            const text = readFileSync(file, 'utf8');
            return new Set([...text.matchAll(/\$\{([A-Z0-9_]+)/g)].map((match) => match[1]));
          }

          const checks = [
            ['docker-compose.dev.yml', '.env.dev.example'],
            ['docker-compose.prod.yml', '.env.prod.example'],
          ];

          let failed = false;
          for (const [composeFile, envFile] of checks) {
            const keys = envKeys(envFile);
            const missing = [...composeVars(composeFile)].filter((key) => !keys.has(key)).sort();
            if (missing.length) {
              failed = true;
              console.error(`${envFile} is missing variables used by ${composeFile}: ${missing.join(', ')}`);
            }
          }

          const prodKeys = envKeys('.env.prod.example');
          const requiredProd = [
            'ADMIN_API_KEY',
            'API_IMAGE',
            'BOT_IMAGE',
            'CORS_ORIGIN',
            'DB_NAME',
            'DB_PASSWORD',
            'DB_USER',
            'DISCORD_CLIENT_ID',
            'DISCORD_TOKEN',
            'DOMAIN',
            'IHM_IMAGE',
            'JWT_SECRET',
            'MISTRAL_API_KEY',
            'NEXT_PUBLIC_SITE_URL',
            'SITE_URL',
            'TRAEFIK_NETWORK',
          ];
          const missingProd = requiredProd.filter((key) => !prodKeys.has(key));
          if (missingProd.length) {
            failed = true;
            console.error(`.env.prod.example is missing production contract keys: ${missingProd.join(', ')}`);
          }

          if (failed) process.exit(1);
          NODE

  lint:
    name: Lint (Biome)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            api/node_modules
            ihm/node_modules
            extractor/node_modules
            bot/node_modules
            db/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install fallback
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run lint:ci

  typecheck:
    name: Typecheck (${{ matrix.name }})
    needs: install
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            cmd: npm run typecheck --workspace=@starvis/api
          - name: ihm
            cmd: npm run typecheck --workspace=starvis-ihm
          - name: extractor
            cmd: npm run typecheck --workspace=@starvis/extractor
          - name: bot
            cmd: npm run typecheck --workspace=@starvis/bot
          - name: db
            cmd: npm run typecheck --workspace=@starvis/db
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            api/node_modules
            ihm/node_modules
            extractor/node_modules
            bot/node_modules
            db/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install fallback
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore Prisma client cache
        uses: actions/cache@v5
        with:
          path: db/generated/
          key: db-gen-${{ runner.os }}-${{ hashFiles('db/prisma/**/*.prisma', 'db/prisma.config.ts') }}

      - name: Setup IHM generated Next types
        if: matrix.name == 'ihm'
        run: |
          printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > ihm/next-env.d.ts
          mkdir -p ihm/.next/types && echo 'export {}' > ihm/.next/types/routes.d.ts

      - run: ${{ matrix.cmd }}

  test-api:
    name: Tests API
    needs: install
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: ci_password
          POSTGRES_USER: ci_user
          POSTGRES_DB: starvis_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U ci_user"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            api/node_modules
            ihm/node_modules
            extractor/node_modules
            bot/node_modules
            db/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install fallback
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore Prisma client cache
        uses: actions/cache@v5
        with:
          path: db/generated/
          key: db-gen-${{ runner.os }}-${{ hashFiles('db/prisma/**/*.prisma', 'db/prisma.config.ts') }}

      - name: Apply DB migrations
        run: npm run migrate:deploy --workspace=@starvis/db
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/starvis_test

      - name: Check schema/migrations drift
        run: |
          PGPASSWORD=ci_password psql -h 127.0.0.1 -U ci_user -d starvis_test -c 'CREATE DATABASE starvis_shadow'
          npm exec --workspace=@starvis/db -- prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema prisma/schema \
            --shadow-database-url postgresql://ci_user:ci_password@127.0.0.1:5432/starvis_shadow \
            --exit-code
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/starvis_test

      - name: Run API tests
        run: npm run test --workspace=@starvis/api -- --reporter=verbose
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/starvis_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          NODE_ENV: test
          JWT_SECRET: ci_test_secret_at_least_32_chars_long
          ADMIN_API_KEY: ci_admin_key

  test-extractor:
    name: Tests Extractor
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            api/node_modules
            ihm/node_modules
            extractor/node_modules
            bot/node_modules
            db/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install fallback
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run test --workspace=@starvis/extractor -- --reporter=verbose
        env:
          NODE_ENV: test

  test-ihm:
    name: Tests IHM
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            api/node_modules
            ihm/node_modules
            extractor/node_modules
            bot/node_modules
            db/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install fallback
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run test --workspace=starvis-ihm -- --reporter=verbose

  test-e2e:
    name: Tests E2E (Playwright)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            api/node_modules
            ihm/node_modules
            extractor/node_modules
            bot/node_modules
            db/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install fallback
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright browsers
        run: npm exec --workspace=starvis-ihm -- playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e --workspace=starvis-ihm

  quality-data-prod:
    name: Production Data Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit production API data
        run: npm run quality:audit:data:prod

  build:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, test-api, test-extractor, test-ihm, test-e2e, security, config]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            file: api/Dockerfile
            target: production
          - name: ihm
            file: ihm/Dockerfile
            target: production
          - name: bot
            file: bot/Dockerfile
            target: ''
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: ${{ matrix.image.target }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
          provenance: false

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    environment:
      name: production
      url: https://starvis.ampynjord.bzh
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: debian
          port: 2222
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /home/debian/starvis

            echo "==> Pull latest code..."
            git remote set-url origin https://ampynjord:${{ secrets.GHCR_PAT }}@github.com/ampynjord/starvis.git
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            git remote set-url origin https://github.com/ampynjord/starvis.git

            echo "==> Login GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ampynjord --password-stdin

            echo "==> Validate production compose..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod config --quiet

            echo "==> Pull new images..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull

            echo "==> Ensure database services..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d postgres redis

            echo "==> DB migrations..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm --no-deps api npm run migrate:deploy --workspace=@starvis/db

            echo "==> Rolling restart..."
            if ! docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans; then
              echo "==> API logs..."
              docker logs --tail=200 starvis-api || true
              echo "==> IHM logs..."
              docker logs --tail=200 starvis-ihm || true
              exit 1
            fi

            echo "==> Health check..."
            for i in $(seq 1 18); do
              API_HEALTH="$(docker inspect --format='{{.State.Health.Status}}' starvis-api 2>/dev/null || echo missing)"
              IHM_HEALTH="$(docker inspect --format='{{.State.Health.Status}}' starvis-ihm 2>/dev/null || echo missing)"
              if [ "$API_HEALTH" = "healthy" ] && [ "$IHM_HEALTH" = "healthy" ]; then
                break
              fi
              echo "Waiting for healthy containers... api=${API_HEALTH} ihm=${IHM_HEALTH}"
              sleep 5
            done

            docker inspect --format='{{.State.Health.Status}}' starvis-api | grep -q "^healthy$" \
              || (echo "API health check FAILED" && docker logs --tail=200 starvis-api && exit 1)
            docker inspect --format='{{.State.Health.Status}}' starvis-ihm | grep -q "^healthy$" \
              || (echo "IHM health check FAILED" && docker logs --tail=200 starvis-ihm && exit 1)

            echo "==> Runtime smoke tests..."
            docker exec starvis-api sh -c 'wget -qO- "http://127.0.0.1:${PORT:-3000}/health/live" >/dev/null'
            docker exec starvis-api sh -c 'wget -qO- "http://127.0.0.1:${PORT:-3000}/health/ready" >/dev/null'
            docker exec starvis-ihm wget -qO- "http://127.0.0.1:${PORT:-8080}/" >/dev/null

            echo "==> Prune old images..."
            docker image prune -af --filter "until=24h"

            echo "==> Deploy complete."
