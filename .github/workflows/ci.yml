name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  NODE_VERSION: '22'
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  # ---------------------------------------------------------------------------
  # Change detection: scopes the expensive jobs to what actually changed.
  # Pushes to main and manual runs always force the full matrix (run_all).
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      run_all: ${{ steps.decide.outputs.run_all }}
      api: ${{ steps.filter.outputs.api }}
      ihm: ${{ steps.filter.outputs.ihm }}
      extractor: ${{ steps.filter.outputs.extractor }}
      bot: ${{ steps.filter.outputs.bot }}
      extension: ${{ steps.filter.outputs.extension }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v6

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            shared: &shared
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
              - 'package.json'
              - 'package-lock.json'
              - 'biome.json'
            api:
              - *shared
              - 'api/**'
              - 'db/**'
            ihm:
              - *shared
              - 'ihm/**'
            extractor:
              - *shared
              - 'extractor/**'
              - 'db/**'
            bot:
              - *shared
              - 'bot/**'
            extension:
              - *shared
              - 'extensions/**'
            e2e:
              - *shared
              - 'ihm/**'
              - 'api/**'

      - name: Decide full run
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
            || [ "${{ github.ref }}" = "refs/heads/main" ] \
            || [ "${{ steps.filter.outputs.shared }}" = "true" ]; then
            echo "run_all=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_all=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Fast lane: cheap, always-on checks that validate the whole repo.
  # ---------------------------------------------------------------------------
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Critical dependency audit
        run: npm audit --omit=dev --audit-level=critical

  dockerfile-lint:
    name: Dockerfile Lint (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            file: api/Dockerfile
          - name: ihm
            file: ihm/Dockerfile
          - name: bot
            file: bot/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.file }}
          failure-threshold: error

  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run lint:ci

  config:
    name: Config, Schema & Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Validate OpenAPI
        run: npm run openapi:lint --workspace=@starvis/api

      - name: Audit API contract coverage
        run: npm run quality:audit:contracts

      - name: Validate Prisma schema
        run: npm exec --workspace=@starvis/db -- prisma validate --schema=prisma/schema
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/starvis_test

      - name: Guard Prisma datasource config
        run: |
          if grep -R 'url *= *env(' db/prisma/schema/*.prisma; then
            echo "Prisma 7 requires datasource URLs in db/prisma.config.ts, not schema files"
            exit 1
          fi
          test -f db/prisma.config.ts

      - name: Validate shell scripts
        run: |
          bash -n db/scripts/init.sh
          bash -n db/scripts/backup.sh

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.dev.yml --env-file .env.dev.example config --quiet
          docker compose -f docker-compose.prod.yml --env-file .env.prod.example config --quiet

      - name: Check env examples cover compose variables
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          function envKeys(file) {
            return new Set(
              readFileSync(file, 'utf8')
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter((line) => line && !line.startsWith('#') && /^[A-Za-z_][A-Za-z0-9_]*=/.test(line))
                .map((line) => line.split('=', 1)[0]),
            );
          }

          function composeVars(file) {
            const text = readFileSync(file, 'utf8');
            return new Set([...text.matchAll(/\$\{([A-Z0-9_]+)/g)].map((match) => match[1]));
          }

          const checks = [
            ['docker-compose.dev.yml', '.env.dev.example'],
            ['docker-compose.prod.yml', '.env.prod.example'],
          ];

          let failed = false;
          for (const [composeFile, envFile] of checks) {
            const keys = envKeys(envFile);
            const missing = [...composeVars(composeFile)].filter((key) => !keys.has(key)).sort();
            if (missing.length) {
              failed = true;
              console.error(`${envFile} is missing variables used by ${composeFile}: ${missing.join(', ')}`);
            }
          }

          const prodKeys = envKeys('.env.prod.example');
          const requiredProd = [
            'ADMIN_API_KEY',
            'API_IMAGE',
            'BOT_IMAGE',
            'CORS_ORIGIN',
            'DB_NAME',
            'DB_PASSWORD',
            'DB_USER',
            'DISCORD_CLIENT_ID',
            'DISCORD_TOKEN',
            'DOMAIN',
            'IHM_IMAGE',
            'JWT_SECRET',
            'MISTRAL_API_KEY',
            'NEXT_PUBLIC_SITE_URL',
            'SITE_URL',
            'TRAEFIK_NETWORK',
          ];
          const missingProd = requiredProd.filter((key) => !prodKeys.has(key));
          if (missingProd.length) {
            failed = true;
            console.error(`.env.prod.example is missing production contract keys: ${missingProd.join(', ')}`);
          }

          if (failed) process.exit(1);
          NODE

  typecheck:
    name: Typecheck (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            cmd: npm run typecheck --workspace=@starvis/api
          - name: ihm
            cmd: npm run typecheck --workspace=starvis-ihm
            setupNextTypes: true
          - name: extractor
            cmd: npm run typecheck --workspace=@starvis/extractor
          - name: bot
            cmd: npm run typecheck --workspace=@starvis/bot
          - name: db
            cmd: npm run typecheck --workspace=@starvis/db
          - name: extension
            cmd: npm run typecheck --workspace=@starvis/rsi-hangar-sync-extension
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Setup IHM generated Next types
        if: matrix.setupNextTypes == true
        run: |
          printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > ihm/next-env.d.ts
          mkdir -p ihm/.next/types && echo 'export {}' > ihm/.next/types/routes.d.ts

      - run: ${{ matrix.cmd }}

  # ---------------------------------------------------------------------------
  # Scoped lane: heavier jobs that only run when their area (or run_all) changed.
  # ---------------------------------------------------------------------------
  test-api:
    name: Tests API
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_all == 'true' || needs.changes.outputs.api == 'true'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: ci_password
          POSTGRES_USER: ci_user
          POSTGRES_DB: starvis_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U ci_user"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Apply DB migrations
        run: npm run migrate:deploy --workspace=@starvis/db
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/starvis_test

      - name: Check schema/migrations drift
        run: |
          PGPASSWORD=ci_password psql -h 127.0.0.1 -U ci_user -d starvis_test -c 'CREATE DATABASE starvis_shadow'
          npm exec --workspace=@starvis/db -- prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema prisma/schema \
            --exit-code
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/starvis_test
          SHADOW_DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/starvis_shadow

      - name: Run API tests
        run: npm run test --workspace=@starvis/api -- --reporter=verbose
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/starvis_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          NODE_ENV: test
          JWT_SECRET: ci_test_secret_at_least_32_chars_long
          ADMIN_API_KEY: ci_admin_key

  test-extractor:
    name: Tests Extractor
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_all == 'true' || needs.changes.outputs.extractor == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run test --workspace=@starvis/extractor -- --reporter=verbose
        env:
          NODE_ENV: test

  test-ihm:
    name: Tests IHM
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_all == 'true' || needs.changes.outputs.ihm == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run test --workspace=starvis-ihm -- --reporter=verbose
        env:
          NODE_ENV: test

  build-ihm:
    name: Build IHM
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_all == 'true' || needs.changes.outputs.ihm == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run build --workspace=starvis-ihm

  build-bot:
    name: Build Bot
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_all == 'true' || needs.changes.outputs.bot == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run build --workspace=@starvis/bot

  build-extension:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_all == 'true' || needs.changes.outputs.extension == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run build --workspace=@starvis/rsi-hangar-sync-extension
      - name: Upload browser extension store packages
        uses: actions/upload-artifact@v4
        with:
          name: starvis-browser-extension-store-packages
          path: extensions/rsi-hangar-sync/dist/store/*.zip
          if-no-files-found: error
          retention-days: 30

  test-e2e:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_all == 'true' || needs.changes.outputs.e2e == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npm exec --workspace=starvis-ihm -- playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e --workspace=starvis-ihm

  # ---------------------------------------------------------------------------
  # Aggregation gate. Always runs; fails only if an executed job failed.
  # Use THIS job as the single required status check in branch protection.
  # ---------------------------------------------------------------------------
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - dependency-audit
      - dockerfile-lint
      - config
      - lint
      - typecheck
      - test-api
      - test-extractor
      - test-ihm
      - build-ihm
      - build-bot
      - build-extension
      - test-e2e
    steps:
      - name: Verify all executed jobs passed
        run: |
          results="${{ join(needs.*.result, ',') }}"
          echo "Job results: $results"
          if echo "$results" | grep -qE 'failure|cancelled'; then
            echo "::error::At least one verification job failed."
            exit 1
          fi
          echo "All executed verification jobs passed."

  # ---------------------------------------------------------------------------
  # Release: build images and deploy, only on main.
  # ---------------------------------------------------------------------------
  build:
    name: Build Image (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality-gate
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            file: api/Dockerfile
            target: production
          - name: ihm
            file: ihm/Dockerfile
            target: production
          - name: bot
            file: bot/Dockerfile
            target: production
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: ${{ matrix.image.target }}
          build-args: |
            NEXT_PUBLIC_STARVIS_EXTENSION_CHROME_STORE_URL=${{ vars.NEXT_PUBLIC_STARVIS_EXTENSION_CHROME_STORE_URL }}
            NEXT_PUBLIC_STARVIS_EXTENSION_FIREFOX_STORE_URL=${{ vars.NEXT_PUBLIC_STARVIS_EXTENSION_FIREFOX_STORE_URL }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-${{ matrix.image.name }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}-${{ matrix.image.name }}:buildcache,mode=max
          provenance: false

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    environment:
      name: production
      url: https://starvis.ampynjord.bzh
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: debian
          port: 2222
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /home/debian/starvis

            echo "==> Pull latest code..."
            git remote set-url origin https://ampynjord:${{ secrets.GHCR_PAT }}@github.com/ampynjord/starvis.git
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            git remote set-url origin https://github.com/ampynjord/starvis.git

            echo "==> Login GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ampynjord --password-stdin

            echo "==> Validate production compose..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod config --quiet

            echo "==> Pull new images..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull

            echo "==> Ensure database services..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d postgres redis

            echo "==> DB migrations..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm --no-deps api npm run migrate:deploy --workspace=@starvis/db

            wait_for_health() {
              container="$1"
              label="$2"
              attempts="${3:-24}"
              for i in $(seq 1 "$attempts"); do
                health="$(docker inspect --format='{{.State.Health.Status}}' "$container" 2>/dev/null || echo missing)"
                if [ "$health" = "healthy" ]; then
                  return 0
                fi
                echo "Waiting for ${label} health... ${health}"
                sleep 5
              done
              echo "${label} health check FAILED"
              docker logs --tail=200 "$container" || true
              return 1
            }

            echo "==> Rolling restart..."
            if ! docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans api; then
              echo "==> API logs..."
              docker logs --tail=200 starvis-api || true
              exit 1
            fi
            wait_for_health starvis-api API

            if ! docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans ihm bot; then
              echo "==> API logs..."
              docker logs --tail=200 starvis-api || true
              echo "==> IHM logs..."
              docker logs --tail=200 starvis-ihm || true
              echo "==> Bot logs..."
              docker logs --tail=200 starvis-bot || true
              exit 1
            fi

            echo "==> Health check..."
            wait_for_health starvis-api API
            wait_for_health starvis-ihm IHM

            echo "==> Runtime smoke tests..."
            docker exec starvis-api sh -c 'wget -qO- "http://127.0.0.1:${PORT:-3000}/health/live" >/dev/null'
            docker exec starvis-api sh -c 'wget -qO- "http://127.0.0.1:${PORT:-3000}/health/ready" >/dev/null'
            docker exec starvis-ihm wget -qO- "http://127.0.0.1:${PORT:-8080}/" >/dev/null

            echo "==> Prune old images..."
            docker image prune -af --filter "until=24h"

            echo "==> Deploy complete."

  quality-data-prod:
    name: Production Data Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit production API data
        env:
          STARVIS_AUDIT_API_KEY: ${{ secrets.STARVIS_AUDIT_API_KEY }}
        run: npm run quality:audit:data:prod
