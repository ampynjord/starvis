
name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_full_pipeline:
        description: "Run lint/test/build pipeline on manual dispatch"
        required: false
        default: false
        type: boolean
      run_safe_smoke_prod:
        description: "Run safe production smoke test"
        required: false
        default: false
        type: boolean
      safe_smoke_base_url:
        description: "Base URL used by safe smoke prod"
        required: false
        default: "https://starvis-api.ampynjord.bzh"
        type: string
      safe_smoke_pace_ms:
        description: "Delay between requests in ms"
        required: false
        default: "1200"
        type: string
      safe_smoke_max_retries:
        description: "Retries for 429/5xx"
        required: false
        default: "4"
        type: string
      safe_smoke_include_frontend:
        description: "Also smoke test frontend routes"
        required: false
        default: false
        type: boolean
      safe_smoke_frontend_base_url:
        description: "Base URL used for frontend smoke routes"
        required: false
        default: "https://starvis.ampynjord.bzh"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ─────────────────────────────────────────────
#  JOBS
# ─────────────────────────────────────────────
jobs:

  # ==========================================
  #  1. LINT & TYPE-CHECK
  # ==========================================
  lint:
    name: "🔍 Lint & Type-check"
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_full_pipeline }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            extractor/package-lock.json
            ihm/package-lock.json

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install & type-check API
        run: cd api && npm ci && npx tsc --noEmit

      - name: Lint API (Biome)
        run: cd api && npx biome check .

      - name: Install & type-check Extractor
        run: cd extractor && npm ci && npx tsc --noEmit

      - name: Lint Extractor (Biome)
        run: cd extractor && npx biome check .

      - name: Install & build IHM
        run: cd ihm && npm ci && npm run build

      - name: Lint IHM (Biome)
        run: cd ihm && npx biome check .

      - name: Audit API dependencies
        run: cd api && npm audit --audit-level=high

      - name: Validate docker-compose files
        run: |
          docker compose -f docker-compose.dev.yml config --quiet
          docker compose -f docker-compose.prod.yml config --quiet
        env:
          DB_USER: ci
          DB_PASSWORD: ci
          DB_NAME: ci
          MYSQL_ROOT_PASSWORD: ci
          ADMIN_API_KEY: ci

  # ==========================================
  #  1.b SAFE PRODUCTION SMOKE (manual)
  # ==========================================
  safe-smoke-prod:
    name: "🩺 Safe smoke prod"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_safe_smoke_prod }}
    timeout-minutes: 10
    env:
      SMOKE_BASE_URL: ${{ inputs.safe_smoke_base_url }}
      SMOKE_PACE_MS: ${{ inputs.safe_smoke_pace_ms }}
      SMOKE_MAX_RETRIES: ${{ inputs.safe_smoke_max_retries }}
      SMOKE_INCLUDE_FRONTEND: ${{ inputs.safe_smoke_include_frontend }}
      SMOKE_FRONTEND_BASE_URL: ${{ inputs.safe_smoke_frontend_base_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run safe production smoke test
        run: node smoke-prod-safe.mjs

  # ==========================================
  #  2. UNIT / INTEGRATION TESTS
  # ==========================================
  test:
    name: "🧪 Tests"
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_full_pipeline }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: starvis_test
          MYSQL_USER: starvis_user
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptestroot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: starvis_user
      DB_PASSWORD: testpass
      DB_NAME: starvis_test
      MYSQL_ROOT_PASSWORD: testroot
      DATABASE_URL: mysql://starvis_user:testpass@127.0.0.1:3306/starvis_test
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      ADMIN_API_KEY: ci_test_key
      PORT: 3000
      NODE_ENV: test
      LOG_LEVEL: warn

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            extractor/package-lock.json
            ihm/package-lock.json

      - name: Update npm
        run: npm install -g npm@latest

      - run: cd api && npm ci

      - name: Install extractor deps
        run: cd extractor && npm ci

      - name: Install IHM deps
        run: cd ihm && npm ci

      - name: Install Redis CLI
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Generate Prisma Client
        run: cd api && npx prisma generate

      - name: Wait for services
        run: |
          echo "⏳ Waiting for MySQL..."
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -u root -ptestroot --silent && break
            sleep 2
          done
          echo "✅ MySQL ready"
          
          echo "⏳ Waiting for Redis..."
          for i in $(seq 1 10); do
            redis-cli -h 127.0.0.1 ping > /dev/null 2>&1 && break
            sleep 1
          done
          echo "✅ Redis ready"

      - name: Setup database schema
        run: cd api && npx prisma db push --skip-generate --accept-data-loss --force-reset

      - name: Run API unit tests with coverage
        run: cd api && npm run test:coverage
        env:
          LOG_LEVEL: error

      - name: Run Extractor unit tests with coverage
        run: cd extractor && npm run test:coverage

      - name: Run IHM unit tests with coverage
        run: cd ihm && npm run coverage

      - name: Upload API coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./api/coverage/lcov.info
          flags: api
          name: api-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload Extractor coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./extractor/coverage/lcov.info
          flags: extractor
          name: extractor-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload IHM coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./ihm/coverage/lcov.info
          flags: ihm
          name: ihm-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Install Playwright browsers
        run: cd api && npx playwright install --with-deps chromium

      - name: Start API server
        run: |
          cd api && npx tsx server.ts > server.log 2>&1 &
          echo $! > server.pid
          echo "🚀 API server started (PID: $(cat server.pid))"
          
          # Wait for server to be ready (up to 60 seconds)
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/health/live > /dev/null 2>&1; then
              echo "✅ Liveness check passed"
              break
            fi
            sleep 1
          done
          
          # Check readiness (DB + Redis)
          if curl -sf http://localhost:3000/health/ready > /dev/null 2>&1; then
            echo "✅ Readiness check passed - Server ready for E2E tests"
          else
            echo "❌ Server failed health check"
            cat server.log
            exit 1
          fi
        env:
          P4K_PATH: ""

      - name: Run E2E tests
        run: cd api && npm run test:e2e
        env:
          API_URL: http://localhost:3000

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: api/playwright-report/
          retention-days: 7

      - name: Stop API server
        if: always()
        run: |
          if [ -f api/server.pid ]; then
            PID=$(cat api/server.pid)
            echo "🛑 Stopping API server (PID: $PID)"
            kill $PID 2>/dev/null || echo "Server already stopped"
            rm -f api/server.pid
          fi
          
      - name: Show server logs on failure
        if: failure()
        run: |
          if [ -f api/server.log ]; then
            echo "📋 Server logs:"
            cat api/server.log
          fi

  # ==========================================
  #  3. BUILD DOCKER IMAGE
  # ==========================================
  build:
    name: "🐳 Build Docker image"
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_full_pipeline }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Docker meta (IHM)
        id: meta-ihm
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ihm
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & Push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          target: production
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push IHM image
        uses: docker/build-push-action@v6
        with:
          context: ihm
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-ihm.outputs.tags }}
          labels: ${{ steps.meta-ihm.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  #  4. DEPLOY (main only)
  # ==========================================
  deploy:
    name: "🚀 Deploy"
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    environment: production

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: debian
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e
            cd /home/debian/starvis

            # Reset tracked files to avoid merge conflicts (local edits like chmod)
            git reset --hard HEAD
            git pull --ff-only origin main

            # Resolve env file — prefer .env.prod if present, fall back to .env
            if [ -f .env.prod ]; then
              ENV_OPT="--env-file .env.prod"
            elif [ -f .env ]; then
              ENV_OPT="--env-file .env"
            else
              ENV_OPT=""
            fi

            # Login to GHCR to pull private images
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ampynjord --password-stdin

            # Pull pre-built images from GHCR
            docker compose -f docker-compose.prod.yml $ENV_OPT pull
            docker compose -f docker-compose.prod.yml $ENV_OPT up -d --remove-orphans

            # Logout from GHCR
            docker logout ghcr.io

            # Wait for API health check
            echo "⏳ Waiting for API health..."
            for i in $(seq 1 30); do
              docker exec starvis-api wget -qO- http://localhost:3000/health > /dev/null 2>&1 && break
              sleep 2
            done

            # Verify deployment
            docker exec starvis-api wget -qO- http://localhost:3000/health || echo "⚠️ API health check failed"

            # Cleanup old images
            docker image prune -f

            echo "✅ Deployed $(docker compose -f docker-compose.prod.yml $ENV_OPT ps --format 'table {{.Name}}\t{{.Status}}')"
