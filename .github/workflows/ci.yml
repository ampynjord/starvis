name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  NODE_VERSION: '22'

jobs:
# ─────────────────────────────────────────────────────────────
# INSTALL — node_modules + db/generated/ en cache
# db:generate ne tourne que si les schémas Prisma ont changé
# ─────────────────────────────────────────────────────────────
  install:
    name: Install & Generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            api/node_modules
            ihm/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore db/generated cache
        id: db-gen-cache
        uses: actions/cache@v4
        with:
          path: db/generated/
          key: db-gen-${{ runner.os }}-${{ hashFiles('db/prisma/**/*.prisma') }}

      - name: Generate DB clients
        if: steps.db-gen-cache.outputs.cache-hit != 'true'
        run: npm run db:generate

# ─────────────────────────────────────────────────────────────
# CHECKS — security audit + hadolint (1 seul runner)
# ─────────────────────────────────────────────────────────────
  checks:
    name: Security & Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm audit --omit=dev --audit-level=critical
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: error
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ihm/Dockerfile
          failure-threshold: error
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: bot/Dockerfile
          failure-threshold: error

# ─────────────────────────────────────────────────────────────
# LINT (Biome)
# ─────────────────────────────────────────────────────────────
  lint:
    name: Lint (Biome)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            api/node_modules
            ihm/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install (fallback)
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci
      - run: ./node_modules/.bin/biome ci .

# ─────────────────────────────────────────────────────────────
# TYPECHECK — matrix par workspace
# ─────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck (${{ matrix.name }})
    needs: install
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            cmd: ./node_modules/.bin/tsc --noEmit --project api/tsconfig.json
          - name: extractor
            cmd: ./node_modules/.bin/tsc --noEmit --project extractor/tsconfig.json
          - name: bot
            cmd: ./node_modules/.bin/tsc --noEmit --project bot/tsconfig.json
          - name: ihm
            cmd: ./node_modules/.bin/tsc --noEmit --project ihm/tsconfig.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            api/node_modules
            ihm/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install (fallback)
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Restore db/generated cache
        uses: actions/cache@v4
        with:
          path: db/generated/
          key: db-gen-${{ runner.os }}-${{ hashFiles('db/prisma/**/*.prisma') }}
      - name: Setup IHM next types
        if: matrix.name == 'ihm'
        run: |
          printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > ihm/next-env.d.ts
          mkdir -p ihm/.next/types && echo 'export {}' > ihm/.next/types/routes.d.ts
      - run: ${{ matrix.cmd }}

# ─────────────────────────────────────────────────────────────
# TESTS API (postgres + redis)
# ─────────────────────────────────────────────────────────────
  test-api:
    name: Tests API
    needs: install
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: ci_password
          POSTGRES_USER: ci_user
          POSTGRES_DB: starvis_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U ci_user"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            api/node_modules
            ihm/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install (fallback)
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Restore db/generated cache
        uses: actions/cache@v4
        with:
          path: db/generated/
          key: db-gen-${{ runner.os }}-${{ hashFiles('db/prisma/**/*.prisma') }}
      - name: Apply DB schema
        run: npm run push --workspace=@starvis/db
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/starvis_test
      - name: Run API tests
        run: npm run test --workspace=@starvis/api -- --reporter=verbose
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/starvis_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          NODE_ENV: test
          JWT_SECRET: ci_test_secret_at_least_32_chars_long
          ADMIN_API_KEY: ci_admin_key

# ─────────────────────────────────────────────────────────────
# TESTS EXTRACTOR
# ─────────────────────────────────────────────────────────────
  test-extractor:
    name: Tests Extractor
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            api/node_modules
            ihm/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install (fallback)
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run test --workspace=@starvis/extractor -- --reporter=verbose
        env:
          NODE_ENV: test

# ─────────────────────────────────────────────────────────────
# TESTS IHM
# ─────────────────────────────────────────────────────────────
  test-ihm:
    name: Tests IHM
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            api/node_modules
            ihm/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install (fallback)
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run test --workspace=starvis-ihm -- --reporter=verbose

# ─────────────────────────────────────────────────────────────
# BUILD Docker images (main uniquement)
# ─────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, test-api, test-extractor, test-ihm, checks]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            file: api/Dockerfile
            target: production
          - name: ihm
            file: ihm/Dockerfile
            target: production
          - name: bot
            file: bot/Dockerfile
            target: ''
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: ${{ matrix.image.target }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
          provenance: false

# ─────────────────────────────────────────────────────────────
# DEPLOY VPS — main uniquement
# ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    environment:
      name: production
      url: https://starvis.ampynjord.bzh
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: debian
          port: 2222
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /home/debian/starvis

            echo "==> Pull latest code..."
            git remote set-url origin https://ampynjord:${{ secrets.GHCR_PAT }}@github.com/ampynjord/starvis.git
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            git remote set-url origin https://github.com/ampynjord/starvis.git

            echo "==> Login GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ampynjord --password-stdin

            echo "==> Install node_modules..."
            npm install --silent

            echo "==> DB schema push..."
            DATABASE_URL=$(grep '^DATABASE_URL=' .env.prod | head -1 | sed "s/^DATABASE_URL=['\"]*//" | sed "s/['\"]* *$//")
            export DATABASE_URL
            npm run push --workspace=@starvis/db

            echo "==> Pull new images..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull

            echo "==> Rolling restart..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans

            echo "==> Prune old images..."
            docker image prune -af --filter "until=24h"

            echo "==> Health check..."
            sleep 5
            docker inspect --format='{{.State.Health.Status}}' starvis-api | grep -q "^healthy$" \
              || (echo "Health check FAILED" && exit 1)

            echo "==> Deploy complete."
